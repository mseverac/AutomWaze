name: Notification horaire matin et soir

on:
  repository_dispatch:
    types: [hourly-trigger]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer les dépendances
        run: |
          pip install requests folium WazeRouteCalculator selenium pytz

      - name: Exécuter le script
        run: python main.py

      - name: Commit et push des nouvelles données
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "Mise à jour données Waze $(date -u +'%Y-%m-%d %H:%M')"
          git push
